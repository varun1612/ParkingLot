<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varun Parking Arena — Simulator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; padding: 1.5rem; }
.app { max-width: 1100px; margin: 0 auto; }
.header { margin-bottom: 1.5rem; }
.header h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; }
.header p { font-size: 13px; color: #888; margin-top: 4px; }
.stats-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1.5rem; }
.stat { background: #fff; border-radius: 10px; padding: 14px; border: 1px solid #e8e8e8; }
.stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.stat-value { font-size: 24px; font-weight: 600; color: #1a1a1a; }
.main { display: grid; grid-template-columns: 1fr 340px; gap: 1.5rem; }
.floors { display: flex; flex-direction: column; gap: 1rem; }
.floor-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 1rem 1.25rem; }
.floor-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.floor-title { font-size: 14px; font-weight: 600; color: #1a1a1a; }
.floor-count { font-size: 12px; color: #888; }
.spots-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.spot { width: 60px; height: 60px; border-radius: 8px; border: 1px solid #e8e8e8; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s; }
.spot.available { background: #fff; }
.spot.occupied.small { background: #E1F5EE; border-color: #9FE1CB; }
.spot.occupied.medium { background: #E6F1FB; border-color: #B5D4F4; }
.spot.occupied.large { background: #FAEEDA; border-color: #FAC775; }
.spot-label { font-size: 9px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.spot-icon { font-size: 20px; }
.spot-plate { font-size: 7px; color: #666; text-align: center; overflow: hidden; max-width: 56px; }
.sidebar { display: flex; flex-direction: column; gap: 1rem; }
.panel { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 1rem 1.25rem; }
.panel-title { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 12px; }
.form-row { margin-bottom: 10px; }
.form-label { font-size: 12px; color: #666; margin-bottom: 4px; display: block; }
.form-row input, .form-row select { width: 100%; font-size: 13px; padding: 8px 10px; border: 1px solid #e0e0e0; border-radius: 8px; outline: none; background: #fff; color: #1a1a1a; }
.form-row input:focus, .form-row select:focus { border-color: #888; }
.btn { width: 100%; padding: 9px; font-size: 13px; border-radius: 8px; cursor: pointer; border: 1px solid #e0e0e0; background: #fff; color: #1a1a1a; margin-top: 4px; transition: background 0.15s; }
.btn:hover { background: #f5f5f0; }
.btn.primary { background: #1a1a1a; color: #fff; border-color: transparent; }
.btn.primary:hover { background: #333; }
.ticket-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
.ticket-item { background: #f5f5f0; border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; }
.ticket-info { flex: 1; }
.ticket-plate { font-size: 13px; font-weight: 600; color: #1a1a1a; }
.ticket-meta { font-size: 11px; color: #888; margin-top: 2px; }
.ticket-badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 500; margin-right: 6px; }
.badge-bike { background: #E1F5EE; color: #0F6E56; }
.badge-car { background: #E6F1FB; color: #185FA5; }
.badge-truck { background: #FAEEDA; color: #854F0B; }
.checkout-btn { font-size: 11px; padding: 4px 10px; border-radius: 8px; border: 1px solid #e0e0e0; background: #fff; color: #666; cursor: pointer; }
.checkout-btn:hover { background: #f5f5f0; }
.log { max-height: 160px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
.log-entry { font-size: 12px; color: #666; padding: 6px 8px; background: #f5f5f0; border-radius: 8px; border-left: 2px solid #ddd; }
.log-entry.success { border-left-color: #1D9E75; color: #1a1a1a; }
.log-entry.error { border-left-color: #E24B4A; }
.log-entry.info { border-left-color: #378ADD; }
.log-entry.warn { border-left-color: #EF9F27; }
.empty { font-size: 13px; color: #aaa; text-align: center; padding: 1rem 0; }
.alert-full { background: #FAEEDA; border: 1px solid #EF9F27; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #633806; display: none; margin-bottom: 1rem; font-weight: 500; }
@media (max-width: 700px) { .main { grid-template-columns: 1fr; } .stats-row { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Varun Parking Arena</h1>
    <p>Parking lot simulator — Strategy + Singleton + Observer + Factory patterns</p>
  </div>
  <div id="alertFull" class="alert-full">Parking lot is full — AdminAlert fired!</div>
  <div class="stats-row">
    <div class="stat"><div class="stat-label">Total spots</div><div class="stat-value" id="statTotal">9</div></div>
    <div class="stat"><div class="stat-label">Available</div><div class="stat-value" id="statAvail">9</div></div>
    <div class="stat"><div class="stat-label">Occupied</div><div class="stat-value" id="statOcc">0</div></div>
    <div class="stat"><div class="stat-label">Revenue</div><div class="stat-value" id="statRev">₹0</div></div>
  </div>
  <div class="main">
    <div class="floors" id="floorsContainer"></div>
    <div class="sidebar">
      <div class="panel">
        <div class="panel-title">Park a vehicle</div>
        <div class="form-row">
          <label class="form-label">License plate</label>
          <input type="text" id="plateInput" placeholder="e.g. KA03MM6773" />
        </div>
        <div class="form-row">
          <label class="form-label">Vehicle type</label>
          <select id="vehicleType">
            <option value="BIKE">Bike (Small spot)</option>
            <option value="CAR" selected>Car (Medium spot)</option>
            <option value="TRUCK">Truck (Large spot)</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">Fee strategy</label>
          <select id="feeStrategy">
            <option value="flat">Flat hourly — ₹50/hr</option>
            <option value="vehicle">Vehicle based (Bike ₹30 / Car ₹50 / Truck ₹80)</option>
          </select>
        </div>
        <button class="btn primary" onclick="parkVehicle()">Park vehicle</button>
      </div>
      <div class="panel">
        <div class="panel-title">Active tickets</div>
        <div class="ticket-list" id="ticketList"><div class="empty">No vehicles parked</div></div>
      </div>
      <div class="panel">
        <div class="panel-title">Event log (Observer)</div>
        <div class="log" id="eventLog"><div class="empty">No events yet</div></div>
      </div>
    </div>
  </div>
</div>

<script>
const vehicleToSpot = { BIKE: 'SMALL', CAR: 'MEDIUM', TRUCK: 'LARGE' };
const vehicleIcon = { BIKE: '🛵', CAR: '🚗', TRUCK: '🚛' };
const spotRates = { BIKE: 30, CAR: 50, TRUCK: 80 };
const flatRate = 50;

const floors = [
  { num: 1, spots: [
    { id: 's1', type: 'SMALL', available: true, vehicle: null },
    { id: 's2', type: 'SMALL', available: true, vehicle: null },
    { id: 's3', type: 'MEDIUM', available: true, vehicle: null },
  ]},
  { num: 2, spots: [
    { id: 's4', type: 'SMALL', available: true, vehicle: null },
    { id: 's5', type: 'MEDIUM', available: true, vehicle: null },
    { id: 's6', type: 'MEDIUM', available: true, vehicle: null },
  ]},
  { num: 3, spots: [
    { id: 's7', type: 'MEDIUM', available: true, vehicle: null },
    { id: 's8', type: 'LARGE', available: true, vehicle: null },
    { id: 's9', type: 'LARGE', available: true, vehicle: null },
  ]}
];

const activeTickets = {};
let totalRevenue = 0;

function assignSpot(vehicleType) {
  const required = vehicleToSpot[vehicleType];
  for (const floor of floors) {
    for (const spot of floor.spots) {
      if (spot.available && spot.type === required) {
        return { spot, floorNum: floor.num };
      }
    }
  }
  return null;
}

function calcFee(ticket) {
  const strategy = document.getElementById('feeStrategy').value;
  const mins = Math.max(60, Math.round((Date.now() - ticket.entryTime) / 60000));
  const hours = Math.ceil(mins / 60);
  return strategy === 'flat' ? flatRate * hours : spotRates[ticket.vehicleType] * hours;
}

function parkVehicle() {
  const plate = document.getElementById('plateInput').value.trim().toUpperCase();
  const type = document.getElementById('vehicleType').value;
  if (!plate) { addLog('Enter a license plate number', 'error'); return; }
  if (Object.values(activeTickets).find(t => t.plate === plate)) {
    addLog(plate + ' is already parked', 'error'); return;
  }
  const result = assignSpot(type);
  if (!result) { addLog('No ' + type.toLowerCase() + ' spots available', 'error'); return; }
  const { spot, floorNum } = result;
  const ticketId = 'T' + Math.random().toString(36).substr(2,6).toUpperCase();
  spot.available = false;
  spot.vehicle = { plate, type };
  activeTickets[ticketId] = { ticketId, plate, vehicleType: type, spotId: spot.id, floorNum, entryTime: Date.now() };
  document.getElementById('plateInput').value = '';
  addLog(plate + ' parked at Floor ' + floorNum + ' — Spot ' + spot.id.toUpperCase(), 'success');
  checkFull();
  render();
}

function checkoutVehicle(ticketId) {
  const ticket = activeTickets[ticketId];
  if (!ticket) return;
  const fee = calcFee(ticket);
  totalRevenue += fee;
  for (const floor of floors) {
    const spot = floor.spots.find(s => s.id === ticket.spotId);
    if (spot) { spot.available = true; spot.vehicle = null; }
  }
  delete activeTickets[ticketId];
  addLog(ticket.plate + ' checked out — fee: ₹' + fee.toFixed(0), 'info');
  document.getElementById('alertFull').style.display = 'none';
  render();
}

function checkFull() {
  const anyFree = floors.some(f => f.spots.some(s => s.available));
  if (!anyFree) {
    document.getElementById('alertFull').style.display = 'block';
    addLog('Lot is full — AdminAlert fired!', 'warn');
  }
}

function addLog(msg, type) {
  const log = document.getElementById('eventLog');
  const empty = log.querySelector('.empty');
  if (empty) empty.remove();
  const el = document.createElement('div');
  el.className = 'log-entry ' + (type || 'success');
  const time = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  el.textContent = time + ' — ' + msg;
  log.prepend(el);
  while (log.children.length > 20) log.removeChild(log.lastChild);
}

function render() {
  let avail = 0, occ = 0;
  floors.forEach(f => f.spots.forEach(s => s.available ? avail++ : occ++));
  document.getElementById('statAvail').textContent = avail;
  document.getElementById('statOcc').textContent = occ;
  document.getElementById('statRev').textContent = '₹' + totalRevenue.toFixed(0);

  const fc = document.getElementById('floorsContainer');
  fc.innerHTML = '';
  floors.forEach(floor => {
    const avCount = floor.spots.filter(s => s.available).length;
    const card = document.createElement('div');
    card.className = 'floor-card';
    card.innerHTML = '<div class="floor-header"><span class="floor-title">Floor ' + floor.num + '</span><span class="floor-count">' + avCount + '/' + floor.spots.length + ' available</span></div><div class="spots-grid" id="floor' + floor.num + '"></div>';
    fc.appendChild(card);
    const grid = card.querySelector('.spots-grid');
    floor.spots.forEach(spot => {
      const el = document.createElement('div');
      el.className = 'spot ' + spot.type.toLowerCase() + (spot.available ? ' available' : ' occupied');
      if (spot.available) {
        el.innerHTML = '<span style="font-size:18px;opacity:0.2">P</span><span class="spot-label">' + spot.type[0] + '</span>';
      } else {
        el.innerHTML = '<span class="spot-icon">' + vehicleIcon[spot.vehicle.type] + '</span><span class="spot-plate">' + spot.vehicle.plate + '</span>';
      }
      grid.appendChild(el);
    });
  });

  const tl = document.getElementById('ticketList');
  tl.innerHTML = '';
  const tickets = Object.values(activeTickets);
  if (tickets.length === 0) {
    tl.innerHTML = '<div class="empty">No vehicles parked</div>';
  } else {
    tickets.forEach(t => {
      const mins = Math.round((Date.now() - t.entryTime) / 60000);
      const item = document.createElement('div');
      item.className = 'ticket-item';
      item.innerHTML = '<div class="ticket-info"><div style="display:flex;align-items:center;gap:6px"><span class="ticket-badge badge-' + t.vehicleType.toLowerCase() + '">' + t.vehicleType + '</span><span class="ticket-plate">' + t.plate + '</span></div><div class="ticket-meta">Floor ' + t.floorNum + ' · ' + mins + ' min · ' + t.ticketId + '</div></div><button class="checkout-btn" onclick="checkoutVehicle(\'' + t.ticketId + '\')">Check out</button>';
      tl.appendChild(item);
    });
  }
}

render();
</script>
</body>
</html>
